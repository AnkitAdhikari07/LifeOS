<style>
  :root {
    --bg-panel:  #181736;
    --line:      #2A2952;
    --text-soft: #C7C4E6;
    --text-dim:  #7C79A6;
    --amber:     #FFB454;
    --teal:      #5EEAD4;
  }

  nav.lifeos {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
  }

  .signal-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--teal);
    flex-shrink: 0;
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(94,234,212,0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(94,234,212,0); }
    100% { box-shadow: 0 0 0 0   rgba(94,234,212,0); }
  }

  .nav-link {
    position: relative;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    padding-bottom: 4px;
    transition: color 0.2s ease;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    left: 0; bottom: -2px;
    width: 0; height: 2px;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.25s ease;
  }
  .nav-link:hover        { color: var(--text-soft); }
  .nav-link:hover::after { width: 100%; }
  .nav-link.active        { color: var(--text-soft); }
  .nav-link.active::after { width: 100%; }

  .burger-line {
    display: block;
    height: 2px; width: 22px;
    background: var(--text-soft);
    border-radius: 2px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #burgerBtn.open .line-1 { transform: translateY(7px) rotate(45deg); }
  #burgerBtn.open .line-2 { opacity: 0; }
  #burgerBtn.open .line-3 { transform: translateY(-7px) rotate(-45deg); }

  #mobilePanel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
  }
  #mobilePanel.open { max-height: 460px; }

  .mobile-link {
    color: var(--text-dim);
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .mobile-link:hover,
  .mobile-link.active {
    color: var(--text-soft);
    border-left-color: var(--amber);
    background: rgba(255,180,84,0.06);
  }

  .clock-chip {
    border: 1px solid var(--line);
    color: var(--text-dim);
  }
</style>

<nav class="lifeos sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-5 md:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <div class="flex items-center gap-2">
        <span class="signal-dot"></span>
        <h1 class="text-xl font-bold tracking-tight" style="font-family:'Space Grotesk',sans-serif; color:var(--text-soft);">
          Life<span style="color:var(--amber);">OS</span>
        </h1>
      </div>

      <!-- Desktop links -->
      <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0">
        <li><a href="#" class="nav-link active" data-link>Dashboard</a></li>
        <li><a href="#" class="nav-link" data-link>Tasks</a></li>
        <li><a href="#" class="nav-link" data-link>Notes</a></li>
        <li><a href="#" class="nav-link" data-link>Budget</a></li>
        <li><a href="#" class="nav-link" data-link>Travel</a></li>
        <li><a href="#" class="nav-link" data-link>Timetable</a></li>
      </ul>

      <!-- Right: clock + burger -->
      <div class="flex items-center gap-3">
        <span id="clock" class="hidden md:inline-block font-mono text-xs clock-chip rounded-full px-3 py-1.5"
              style="font-family:'JetBrains Mono',monospace;"></span>
        <button id="burgerBtn" class="md:hidden flex flex-col gap-[5px] p-2 bg-transparent border-none cursor-pointer"
                aria-label="Toggle menu">
          <span class="burger-line line-1"></span>
          <span class="burger-line line-2"></span>
          <span class="burger-line line-3"></span>
        </button>
      </div>

    </div>
  </div>
</nav>

<!-- Mobile panel -->
<div id="mobilePanel">
  <ul class="flex flex-col list-none m-0 py-2">
    <li><a href="#" class="mobile-link block px-6 py-3 active" data-link>Dashboard</a></li>
    <li><a href="#" class="mobile-link block px-6 py-3" data-link>Tasks</a></li>
    <li><a href="#" class="mobile-link block px-6 py-3" data-link>Notes</a></li>
    <li><a href="#" class="mobile-link block px-6 py-3" data-link>Budget</a></li>
    <li><a href="#" class="mobile-link block px-6 py-3" data-link>Travel</a></li>
    <li><a href="#" class="mobile-link block px-6 py-3" data-link>Timetable</a></li>
    <li class="px-6 pt-2 pb-3">
      <span id="clockMobile" class="font-mono text-xs clock-chip rounded-full px-3 py-1.5 inline-block"
            style="font-family:'JetBrains Mono',monospace;"></span>
    </li>
  </ul>
</div>

<script>
  const burgerBtn   = document.getElementById('burgerBtn');
  const mobilePanel = document.getElementById('mobilePanel');

  burgerBtn.addEventListener('click', () => {
    burgerBtn.classList.toggle('open');
    mobilePanel.classList.toggle('open');
  });

  const allLinks = document.querySelectorAll('[data-link]');
  allLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const label = link.textContent.trim();
      allLinks.forEach(l => l.classList.toggle('active', l.textContent.trim() === label));
      burgerBtn.classList.remove('open');
      mobilePanel.classList.remove('open');
    });
  });

  function tick() {
    const t = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('clock').textContent = t;
    const m = document.getElementById('clockMobile');
    if (m) m.textContent = t;
  }
  tick();
  setInterval(tick, 1000);
</script>
